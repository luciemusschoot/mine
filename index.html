<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="steelblue">
</head>
<body style="visibility:hidden;"> <!-- caché tant que Firebase n'a pas validé -->

  <div class="login-page">
      <div class="login-container">
          <h2>Connexion / Inscription</h2>
          <input type="text" id="prenom" placeholder="Prénom">
          <input type="text" id="username" placeholder="Email">
          <input type="password" id="password" placeholder="Mot de passe">
          <button id="loginBtn">Se connecter / S'inscrire</button>
          <p id="error" class="error"></p>
      </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0okm0KZIZQOad0n0s0S2J8XBtjbyBVsY",
      authDomain: "mine-appli.firebaseapp.com",
      projectId: "mine-appli",
      storageBucket: "mine-appli.appspot.com",
      messagingSenderId: "266538682503",
      appId: "1:266538682503:web:820d7bf66153d76530d022"
    };

    // Initialiser Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Redirection si déjà connecté
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = "accueil.html";
      } else {
        document.body.style.visibility = "visible"; // montrer login si pas connecté
      }
    });

    // Attacher le clic après que Firebase et le DOM sont prêts
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("loginBtn").addEventListener("click", () => {
        const prenom = document.getElementById("prenom").value.trim();
        const email = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!prenom || !email || !password) {
          alert("Merci de remplir tous les champs !");
          return;
        }

        // Connexion
        auth.signInWithEmailAndPassword(email, password)
          .then(userCredential => {
            sessionStorage.setItem("prenom", prenom);
            window.location.href = "accueil.html";
          })
          .catch(error => {
            if (error.code === "auth/user-not-found") {
              // Création compte
              auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                  return userCredential.user.updateProfile({ displayName: prenom });
                })
                .then(() => {
                  sessionStorage.setItem("prenom", prenom);
                  window.location.href = "accueil.html";
                })
                .catch(err => alert("Erreur inscription : " + err.message));
            } else {
              alert("Erreur connexion : " + error.message);
            }
          });
      });
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker enregistré'))
        .catch(err => console.error('Erreur SW:', err));
    }
  </script>

</body>
</html>
