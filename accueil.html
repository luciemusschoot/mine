<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon site mobile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="welcomeMessage"></h1>
    <button id="logoutBtn" class="deconnexion">Se déconnecter</button>
  </header>

  <main>
    <section>
      <h2>Food</h2>
      <p>T'attends la famine pour te bouger ?</p>
      <a href="food.html">
        <button>Non à la famine</button>
      </a>
    </section>
    <section>
      <h2>Santé</h2>
      <p>Aies la pêche pas le blues</p>
      <a href="santé.html">
        <button>La santé, ça dit quoi ?</button>
      </a>
    </section>
    <section>
      <h2>Handball</h2>
      <p>On vise le sommet</p>
      <a href="handball.html">
        <button>Comme une envie de swinguer ?</button>
      </a>
    </section>

  </main>
  <script>
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.getElementById("welcomeMessage").textContent =
          "Bienvenue " + user.email;
      }
    });
  </script>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
      });
    });
</script>
  </body>
</html>
