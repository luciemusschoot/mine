<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santé</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="steelblue">
</head>
<body>
  <p>Pas encore fait non plus</p>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyD0okm0KZIZQOad0n0s0S2J8XBtjbyBVsY",
    authDomain: "mine-appli.firebaseapp.com",
    projectId: "mine-appli",
    storageBucket: "mine-appli.appspot.com",
    messagingSenderId: "266538682503",
    appId: "1:266538682503:web:820d7bf66153d76530d022"
  };
  firebase.initializeApp(firebaseConfig);

  document.addEventListener("DOMContentLoaded", () => {
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "index.html"; // pas connecté → redirection
      } else {
        document.body.style.visibility = "visible"; // connecté → afficher le contenu
      }
    });
  });
  </script>
</body>
</html>
