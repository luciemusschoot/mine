<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site avec connexion</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="steelblue">
</head>
<body>
  <p>Pas encore fait non plus</p>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // Config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyD0okm0KZIZQOad0n0s0S2J8XBtjbyBVsY",
      authDomain: "mine-appli.firebaseapp.com",
      projectId: "mine-appli",
      storageBucket: "mine-appli.appspot.com",
      messagingSenderId: "266538682503",
      appId: "1:266538682503:web:820d7bf66153d76530d022"
    };

    // Initialiser Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Vérifier si utilisateur connecté
    auth.onAuthStateChanged(user => {
      if (user) {
        const prenom = user.displayName || sessionStorage.getItem("prenom") || user.email.split("@")[0];
        document.getElementById("welcomeMessage").textContent = "Bonjour " + prenom;
        document.body.style.visibility = "visible";
      } else {
        window.location.href = "index.html";
      }
    });

    // Déconnexion
    document.getElementById("logoutBtn").addEventListener("click", () => {
      auth.signOut().then(() => {
        window.location.href = "index.html";
      });
    });
  </script>
</body>
</html>
